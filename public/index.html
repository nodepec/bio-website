<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="nodepec — terminal bio" />
  <title>session://bio</title>
  <link rel="icon" href="web.ico" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    :root {
      --bg:        #060809;
      --surface:   rgba(255,255,255,.03);
      --border:    rgba(255,255,255,.10);
      --border-hi: rgba(255,255,255,.20);
      --text:      #e2e2e2;
      --dim:       rgba(226,226,226,.55);
      --accent:    #4fffb0;
      --radius:    13px;
      --mono:      ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      --shadow:    0 32px 100px rgba(0,0,0,.7);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }

    body {
      background: radial-gradient(ellipse 120% 80% at 50% 0%, #0b1117 0%, #060809 55%, #020304 100%);
      color: var(--text);
      font-family: var(--mono);
      overflow: hidden;
    }

    .stage {
      height: 100%;
      display: grid;
      place-items: center;
      padding: 32px 16px;
      position: relative;
    }

    .particles-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      image-rendering: pixelated;
    }

    .terminal-shell {
      position: relative;
      z-index: 1;
      width: min(900px, 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: linear-gradient(160deg, rgba(255,255,255,.04) 0%, rgba(255,255,255,.015) 100%);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.06);
      overflow: hidden;
    }

    .titlebar {
      height: 48px;
      display: grid;
      grid-template-columns: 100px 1fr 100px;
      align-items: center;
      padding: 0 14px;
      background: rgba(0,0,0,.25);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(4px);
    }

    .dots { display: flex; gap: 8px; align-items: center; }
    .dot  { width: 11px; height: 11px; border-radius: 50%; }
    .dot-r { background: #ff5f57; }
    .dot-y { background: #febc2e; }
    .dot-g { background: #28c840; }

    .title-text {
      text-align: center;
      font-size: 12px;
      color: var(--dim);
      letter-spacing: .04em;
    }

    .terminal-body {
      position: relative;
      height: min(600px, 76vh);
      overflow: hidden;
      outline: none;
    }

    .terminal-body::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 20;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 3px,
        rgba(255,255,255,.012) 3px, rgba(255,255,255,.012) 4px
      );
      mix-blend-mode: overlay;
    }

    .screen {
      position: absolute;
      inset: 0;
      padding: 24px;
      display: flex;
      flex-direction: column;
      opacity: 1;
      transform: translateY(0);
      transition: opacity .22s ease, transform .22s ease;
    }

    .screen-off {
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
    }

    .boot-inner {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .ascii-art {
      font-size: 13px;
      line-height: 1.15;
      white-space: pre;
      text-align: center;
      color: rgba(226,226,226,.85);
      user-select: none;
      filter: drop-shadow(0 0 18px rgba(79,255,176,.12));
    }

    .boot-info {
      font-size: 13.5px;
      line-height: 1.7;
      display: grid;
      grid-template-columns: 8ch 1fr;
      gap: 0 8px;
    }

    .boot-label { color: var(--dim); }
    .boot-value { color: var(--text); }

    .boot-loaded {
      font-size: 13px;
      color: var(--accent);
      letter-spacing: .05em;
      margin-top: 4px;
    }

    .hint {
      font-size: 12.5px;
      color: var(--dim);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .bio-inner {
      flex: 1;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 10px;
      overflow: hidden;
    }

    .prompt-line {
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .p-host { color: var(--accent); opacity: .85; }
    .p-dim  { color: var(--dim); }
    .p-path { color: rgba(226,226,226,.65); }
    .p-cmd  { color: var(--text); }

    .tabs-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tab-btn {
      font-family: var(--mono);
      font-size: 12px;
      padding: 5px 11px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--dim);
      cursor: pointer;
      transition: color .15s, border-color .15s, background .15s;
      letter-spacing: .02em;
    }

    .tab-btn:hover { color: var(--text); border-color: var(--border-hi); }

    .tab-btn.active {
      color: var(--accent);
      border-color: rgba(79,255,176,.35);
      background: rgba(79,255,176,.06);
    }

    .viewport {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(0,0,0,.18);
      overflow: hidden;
      position: relative;
    }

    .page {
      position: absolute;
      inset: 0;
      padding: 14px 16px;
      overflow: auto;
      opacity: 0;
      transform: translateX(8px);
      transition: opacity .2s ease, transform .2s ease;
      pointer-events: none;
    }

    .page.active {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    .panel {
      border: 1px solid var(--border);
      background: rgba(0,0,0,.2);
      border-radius: 9px;
      padding: 13px 15px;
      color: rgba(226,226,226,.82);
      font-size: 13px;
      line-height: 1.6;
      white-space: pre;
      font-family: var(--mono);
      overflow: hidden;
    }

    .links-panel {
      border: 1px solid var(--border);
      background: rgba(0,0,0,.2);
      border-radius: 9px;
      padding: 13px 15px;
      display: grid;
      gap: 10px;
    }

    .link-item {
      color: rgba(226,226,226,.75);
      text-decoration: none;
      font-size: 13px;
      border-bottom: 1px dashed var(--border);
      width: fit-content;
      padding-bottom: 1px;
      transition: color .15s, border-color .15s;
    }

    .link-item:hover {
      color: var(--accent);
      border-bottom-color: rgba(79,255,176,.4);
    }

    .kbd-hint {
      margin-top: 10px;
      font-size: 12px;
      color: var(--dim);
    }

    .footer-bar {
      font-size: 12px;
      color: var(--dim);
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .key {
      display: inline-flex;
      align-items: center;
      padding: 1px 7px;
      border: 1px solid var(--border-hi);
      border-bottom: 2px solid var(--border);
      border-radius: 5px;
      background: rgba(255,255,255,.04);
      font-size: 11px;
      color: var(--text);
      font-family: var(--mono);
      cursor: default;
    }

    .dud { opacity: .45; color: var(--accent); }

    @media (max-width: 520px) {
      .screen { padding: 16px; }
      .ascii-art { font-size: 11px; }
    }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const HACKER_CAT = '     welcome!\n    /\\_/\\           ___\n   = o_o =_______    \\ \\ \n    __^      __(  \\.__) )\n(@)<_____>__(_____)____/';

const TABS = ['profile', 'about', 'skills', 'projects', 'writeups', 'links'];

const CONTENT = {
  profile:  'Name:       [REDACTED]\nHandle:     @nodepec\nFocus:      CTF / web / cyber security\nLocation:   Perth, AU\nStatus:     learning + building\n\nNotes:\n- I participate in ctf events every now and then\n- I keep solutions to the main challenges\n- I dont like boring stuff',
  about:    'I like difficult challenges that make me think\nsmall hypotheses -> quick tests -> record -> refine\n\nI\'m most interested in:\n- web apps\n- cryptography\n- open source intelligence',
  skills:   'Coding:\n- JavaScript, Python, Html, Css\n\nCTF / security:\n- web fundamentals, auth flows, input handling mindset\n- writeups: assumptions -> tests -> evidence -> lesson\n\nTools:\n- Burp (learning), Wireshark (also learning), Ghidra (ultra noob)',
  projects: 'https://nodepec.github.io/The-Challenges/\n\nThis is my self made ctf challenges that use ai to adapt my\nencryption methods into an interactive story that makes you\nfeel like it is something meaningful',
  writeups: '[placeholder] lorem ipsum dolor sit amet\n[placeholder] lorem ipsum dolor sit amet\n[placeholder] lorem ipsum dolor sit amet',
};

const LINKS = [
  { href: 'https://github.com/nodepec',      label: 'github://nodepec' },
  { href: 'https://ctftime.org/team/402033', label: 'ctftime://team'   },
];

const CMD_MAP  = { profile: 'cat profile.txt', about: 'cat about.md', skills: 'cat skills.txt', projects: 'cat projects.json', writeups: 'tail -n 3 latest.log', links: 'cat links.txt' };
const PATH_MAP = { profile: '~/bio', about: '~/bio/about', skills: '~/bio/skills', projects: '~/bio/projects', writeups: '~/bio/writeups', links: '~/bio/links' };

const SC = '!<>-_\\/[]{}=+*^?#________';

function runScramble(el, finalText) {
  if (!el || el._scrambling) return;
  const old = el.innerText || '';
  const len = Math.max(old.length, finalText.length);
  const q   = [];
  for (let i = 0; i < len; i++) {
    const s = Math.floor(Math.random() * 40);
    q.push({ from: old[i] || '', to: finalText[i] || '', start: s, end: s + Math.floor(Math.random() * 40), char: '' });
  }
  el._scrambling = true;
  let f = 0;
  const run = () => {
    let out = '', done = 0;
    for (let i = 0; i < q.length; i++) {
      const e = q[i];
      if (f >= e.end)        { done++; out += e.to; }
      else if (f >= e.start) { if (!e.char || Math.random() < 0.28) e.char = SC[Math.floor(Math.random() * SC.length)]; out += '<span class="dud">' + e.char + '</span>'; }
      else                   { out += e.from; }
    }
    el.innerHTML = out;
    if (done === q.length) { el._scrambling = false; el.innerHTML = finalText; }
    else { f++; requestAnimationFrame(run); }
  };
  run();
}

function Particles({ terminalRef }) {
  const cvs = useRef(null);
  useEffect(() => {
    const canvas = cvs.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const C = { count:110, size:2, speed:.35, lifetime:220, rr:90, rf:.18, bc:18, bs:3.2, col:'#fff', op:.5 };
    const r2 = C.rr * C.rr, PAD = 14;
    let tr = {l:0,t:0,r:0,b:0}, W=0, H=0;
    const inT = (x,y) => x>=tr.l && x<=tr.r && y>=tr.t && y<=tr.b;
    function rsz() {
      W=canvas.offsetWidth; H=canvas.offsetHeight; canvas.width=W; canvas.height=H;
      if (terminalRef.current) {
        const cr=canvas.getBoundingClientRect(), t=terminalRef.current.getBoundingClientRect();
        tr={l:t.left-cr.left-PAD, t:t.top-cr.top-PAD, r:t.right-cr.left+PAD, b:t.bottom-cr.top+PAD};
      }
    }
    function mp(burst,bx,by) {
      burst=!!burst; bx=bx||0; by=by||0;
      const a=Math.random()*Math.PI*2, spd=burst?C.bs*(0.5+Math.random()):C.speed*(0.4+Math.random()*0.8);
      let x,y;
      if(burst){x=bx;y=by;}else{do{x=Math.random()*W;y=Math.random()*H;}while(inT(x,y));}
      return {x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,phase:Math.random()*Math.PI*2,life:burst?0:Math.floor(Math.random()*C.lifetime),maxLife:C.lifetime+Math.floor(Math.random()*80-40),burst};
    }
    const ps=Array.from({length:C.count},()=>mp());
    const mouse={x:-9999,y:-9999};
    let fc=0, rid;
    const mv=e=>{const cr=canvas.getBoundingClientRect();mouse.x=e.clientX-cr.left;mouse.y=e.clientY-cr.top;};
    const ml=()=>{mouse.x=-9999;mouse.y=-9999;};
    const cl=e=>{const cr=canvas.getBoundingClientRect(),x=e.clientX-cr.left,y=e.clientY-cr.top;if(inT(x,y))return;for(let i=0;i<C.bc;i++)ps.push(mp(true,x,y));};
    window.addEventListener('mousemove',mv,{passive:true});
    window.addEventListener('mouseleave',ml,{passive:true});
    window.addEventListener('click',cl);
    window.addEventListener('resize',rsz,{passive:true});
    rsz();
    const tick=()=>{
      rid=requestAnimationFrame(tick); fc++;
      ctx.clearRect(0,0,W,H);
      for(let i=ps.length-1;i>=0;i--){
        const p=ps[i]; p.life++;
        let a;
        if(p.life<20) a=(p.life/20)*C.op;
        else if(p.life>p.maxLife-40) a=((p.maxLife-p.life)/40)*C.op;
        else a=C.op;
        if(p.life>=p.maxLife){if(p.burst){ps.splice(i,1);continue;}Object.assign(p,mp());continue;}
        const dx=p.x-mouse.x,dy=p.y-mouse.y,d2=dx*dx+dy*dy;
        if(d2<r2&&d2>0){const d=Math.sqrt(d2),f=C.rf*(1-d/C.rr);p.vx+=(dx/d)*f;p.vy+=(dy/d)*f;}
        p.vx*=0.97;p.vy*=0.97;
        if(!p.burst){p.vx+=Math.sin(p.phase+fc*0.012)*0.008;p.vy+=Math.cos(p.phase+fc*0.009)*0.008;}
        p.x+=p.vx;p.y+=p.vy;
        const buf=4;
        if(p.x<-buf)p.x=W+buf;if(p.x>W+buf)p.x=-buf;
        if(p.y<-buf)p.y=H+buf;if(p.y>H+buf)p.y=-buf;
        if(inT(p.x,p.y))continue;
        ctx.globalAlpha=Math.max(0,Math.min(1,a));ctx.fillStyle=C.col;ctx.fillRect(Math.round(p.x),Math.round(p.y),C.size,C.size);
      }
      while(ps.filter(p=>!p.burst).length<C.count)ps.push(mp());
      ctx.globalAlpha=1;
    };
    tick();
    return ()=>{cancelAnimationFrame(rid);window.removeEventListener('mousemove',mv);window.removeEventListener('mouseleave',ml);window.removeEventListener('click',cl);window.removeEventListener('resize',rsz);};
  }, []);
  return <canvas ref={cvs} className="particles-canvas" />;
}

function Key({ children }) {
  const ref = useRef(null);
  return <kbd className="key" ref={ref} onMouseEnter={() => runScramble(ref.current, String(children))}>{children}</kbd>;
}

function PromptLine({ path, cmd, trigger }) {
  const hr = useRef(null), cr = useRef(null);
  useEffect(() => {
    if (hr.current) runScramble(hr.current, 'user@host');
    if (cr.current) runScramble(cr.current, cmd);
  }, [trigger, cmd]);
  return (
    <div className="prompt-line">
      <span className="p-host" ref={hr}>user@host</span>
      <span className="p-dim">:</span>
      <span className="p-path">{path}</span>
      <span className="p-dim">$ </span>
      <span className="p-cmd" ref={cr}>{cmd}</span>
    </div>
  );
}

function BootValue({ label, id, value }) {
  const ref  = useRef(null);
  const prev = useRef('');
  useEffect(() => {
    if (!ref.current) return;
    if (value && value !== prev.current && value !== 'resolving...' && value !== 'loading...') {
      prev.current = value;
      runScramble(ref.current, value);
    } else {
      ref.current.textContent = value;
    }
  }, [value]);
  return (
    <React.Fragment>
      <span className="boot-label">{label}</span>
      <span className="boot-value" id={id} ref={ref}>{value}</span>
    </React.Fragment>
  );
}

function BootScreen({ visible, onEnter, ip, system, uptime }) {
  const eref = useRef(null);
  useEffect(() => {
    if (!visible) return;
    const h = e => { if (e.key !== 'Enter') return; if (eref.current) runScramble(eref.current, 'Enter'); setTimeout(onEnter, 100); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [visible, onEnter]);

  useEffect(() => {
    if (!visible) return;
    const rand = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
    let tid;
    const sched = () => { tid = setTimeout(() => { const ids=['bv-ip','bv-sys','bv-up'], el=document.getElementById(ids[rand(0,2)]); if(el&&!el._scrambling&&el.textContent)runScramble(el,el.textContent); sched(); }, rand(5000,7000)); };
    sched();
    return () => clearTimeout(tid);
  }, [visible]);

  return (
    <div className={'screen' + (visible ? '' : ' screen-off')}>
      <div className="boot-inner">
        <pre className="ascii-art">{HACKER_CAT}</pre>
        <div className="boot-info">
          <BootValue label="IP:"     id="bv-ip"  value={ip}     />
          <BootValue label="System:" id="bv-sys" value={system} />
          <BootValue label="Uptime:" id="bv-up"  value={uptime} />
        </div>
        <div className="boot-loaded">// Bio Loaded</div>
        <div className="hint">
          <span>Press</span>
          <kbd className="key" ref={eref} onMouseEnter={() => runScramble(eref.current, 'Enter')}>Enter</kbd>
          <span>to continue</span>
        </div>
      </div>
    </div>
  );
}

function BioScreen({ visible, onEscape, activeTab, setActiveTab, trigger }) {
  useEffect(() => {
    if (!visible) return;
    const h = e => {
      if      (e.key === 'Escape')     onEscape();
      else if (e.key === 'ArrowRight') setActiveTab(t => TABS[(TABS.indexOf(t)+1)%TABS.length]);
      else if (e.key === 'ArrowLeft')  setActiveTab(t => TABS[(TABS.indexOf(t)-1+TABS.length)%TABS.length]);
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [visible, onEscape, setActiveTab]);

  useEffect(() => {
    if (!visible) return;
    const rand = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
    let tid;
    const sched = () => {
      tid = setTimeout(() => {
        const pool = Array.from(document.querySelectorAll('.page.active .p-host, .page.active .p-cmd, .page.active .p-path, .title-text')).filter(el => !el._scrambling && el.innerText && el.innerText.trim());
        if (pool.length) runScramble(pool[rand(0,pool.length-1)], pool[rand(0,pool.length-1)].innerText);
        sched();
      }, rand(5000,7000));
    };
    sched();
    return () => clearTimeout(tid);
  }, [visible]);

  return (
    <div className={'screen' + (visible ? '' : ' screen-off')}>
      <div className="bio-inner">
        <PromptLine path="~/bio" cmd="open --tabs" trigger={null} />
        <div className="tabs-row" role="tablist">
          {TABS.map(t => (
            <button
              key={t}
              className={'tab-btn' + (activeTab === t ? ' active' : '')}
              role="tab"
              aria-selected={activeTab === t}
              onClick={() => setActiveTab(t)}
              onMouseEnter={e => runScramble(e.currentTarget, t)}
            >{t}</button>
          ))}
        </div>
        <div className="viewport">
          {TABS.map(t => (
            <div key={t} className={'page' + (activeTab === t ? ' active' : '')} role="tabpanel">
              <PromptLine path={PATH_MAP[t]} cmd={CMD_MAP[t]} trigger={trigger} />
              {t === 'links' ? (
                <div className="links-panel">
                  {LINKS.map(l => (
                    <a key={l.href} className="link-item" href={l.href} target="_blank" rel="noreferrer" onMouseEnter={e => runScramble(e.currentTarget, l.label)}>{l.label}</a>
                  ))}
                </div>
              ) : (
                <pre className="panel">{CONTENT[t]}</pre>
              )}
              {t === 'profile' && (
                <div className="kbd-hint">
                  <span>Tip: use </span><Key>{'<-'}</Key><span>/</span><Key>{'->'}</Key><span> to switch tabs</span>
                </div>
              )}
            </div>
          ))}
        </div>
        <div className="footer-bar">
          <span>keys:</span><Key>{'<-'}</Key><span>/</span><Key>{'->'}</Key><span>tabs</span><span>•</span><Key>Esc</Key><span>boot</span>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [screen,    setScreen]    = useState('boot');
  const [activeTab, setActiveTab] = useState('profile');
  const [trigger,   setTrigger]   = useState(0);
  const [ip,        setIp]        = useState('resolving...');
  const [system,    setSystem]    = useState('loading...');
  const [uptime,    setUptime]    = useState('0m');
  const termRef  = useRef(null);
  const startRef = useRef(Date.now());

  const fmt = ms => { const m=Math.floor(ms/60000),h=Math.floor(m/60); return h>0?(h+'h '+(m%60)+'m'):(m+'m'); };

  async function detectClient() {
    const ua = navigator.userAgent || '';
    let os = 'unknown';
    if (navigator.userAgentData && navigator.userAgentData.getHighEntropyValues) {
      try {
        const d = await navigator.userAgentData.getHighEntropyValues(['platform','platformVersion']);
        if      (d.platform==='Windows')  os=parseInt(d.platformVersion,10)>=13?'Windows 11':'Windows 10';
        else if (d.platform==='macOS')    os='macOS';
        else if (d.platform==='Android')  os='Android';
        else if (d.platform==='iOS')      os='iOS';
        else if (d.platform==='Linux')    os='Linux';
      } catch(e) {}
    }
    if (os==='unknown') {
      if      (/Windows NT/.test(ua))       os='Windows';
      else if (/Mac OS X/.test(ua))         os='macOS';
      else if (/Android/.test(ua))          os='Android';
      else if (/iPhone|iPad|iPod/.test(ua)) os='iOS';
      else if (/Linux/.test(ua))            os='Linux';
    }
    let b='unknown';
    if      (/Edg\//.test(ua))                              b='Edge';
    else if (/Chrome\//.test(ua))                           b='Chrome';
    else if (/Firefox\//.test(ua))                          b='Firefox';
    else if (/Safari\//.test(ua)&&!/Chrome\//.test(ua))    b='Safari';
    return os==='unknown'?b:(os+' ('+b+')');
  }

  useEffect(() => {
    (async () => {
      const [ri, rs] = await Promise.all([
        fetch('https://api.ipify.org?format=json',{cache:'no-store'}).then(r=>r.json()).then(d=>d.ip||'unknown').catch(()=>'unknown'),
        detectClient(),
      ]);
      setIp(ri); setSystem(rs); setUptime(fmt(Date.now()-startRef.current));
    })();
    const iv = setInterval(() => setUptime(fmt(Date.now()-startRef.current)), 30000);
    return () => clearInterval(iv);
  }, []);

  const handleTab = useCallback(t => {
    setActiveTab(typeof t === 'function' ? t : () => t);
    setTrigger(k => k+1);
  }, []);

  return (
    <div className="stage">
      <Particles terminalRef={termRef} />
      <div className="terminal-shell" ref={termRef}>
        <div className="titlebar">
          <div className="dots"><div className="dot dot-r"/><div className="dot dot-y"/><div className="dot dot-g"/></div>
          <div className="title-text">session://bio</div>
          <div/>
        </div>
        <div className="terminal-body" tabIndex={0}>
          <BootScreen visible={screen==='boot'} onEnter={()=>setScreen('bio')} ip={ip} system={system} uptime={uptime} />
          <BioScreen  visible={screen==='bio'}  onEscape={()=>setScreen('boot')} activeTab={activeTab} setActiveTab={handleTab} trigger={trigger} />
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>

</body>
</html>
